<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Lego Ball Machine</title>
  <!-- Home-screen install on iOS Safari: fullscreen, dark status bar, short title -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Ball Machine">
  <meta name="theme-color" content="#111111">
  <link rel="apple-touch-icon" href="{{ url_for('static', filename='apple-touch-icon.png') }}">
  <style>
    :root { color-scheme: dark; }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: env(safe-area-inset-top) 1rem env(safe-area-inset-bottom);
      gap: 0.6rem;
      background: #111;
      color: #eee;
      font: 600 18px/1.3 system-ui, -apple-system, "Segoe UI", sans-serif;
      -webkit-user-select: none;
      user-select: none;
      touch-action: manipulation;
    }
    h1 { margin: 0.4rem 0 0.2rem; font-size: 1.4rem; opacity: 0.85; }
    .motor-status {
      font-size: 1rem;
      opacity: 0.7;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }
    .motor-status.running { color: #4ade80; opacity: 1; }
    button {
      width: min(80vw, 360px);
      padding: 1.0rem;
      font: inherit;
      font-size: 1.15rem;
      border: 0;
      border-radius: 14px;
      color: #fff;
      background: #333;
      box-shadow: 0 3px 0 rgba(0, 0, 0, 0.4);
      cursor: pointer;
    }
    button:active {
      transform: translateY(2px);
      box-shadow: 0 1px 0 rgba(0, 0, 0, 0.4);
    }
    .start   { background: #15803d; }
    .stop    { background: #b91c1c; }
    .run5    { background: #1d4ed8; }
    .reverse { background: #7c3aed; }
    .leds-on      { background: #ca8a04; }
    .leds-off     { background: #4b5563; }
    .leds-pattern {
      background: linear-gradient(90deg, #ef4444, #f59e0b, #84cc16, #06b6d4, #8b5cf6);
    }
    .divider {
      margin-top: 0.6rem;
      font-size: 0.85rem;
      opacity: 0.5;
      letter-spacing: 0.15em;
      text-transform: uppercase;
    }
    .speed-row {
      width: min(80vw, 360px);
      display: flex;
      flex-direction: column;
      gap: 0.3rem;
      margin: 0.2rem 0 0.4rem;
    }
    .speed-row label {
      font-size: 0.9rem;
      opacity: 0.7;
      display: flex;
      justify-content: space-between;
    }
    .speed-row label .speed-label { opacity: 1; color: #93c5fd; }
    .speed-row input[type=range] {
      width: 100%;
      accent-color: #1d4ed8;
      height: 2rem;
    }
  </style>
</head>
<body>
  <h1>Lego Ball Machine</h1>

  <div class="divider">Motor 1</div>
  <div class="motor-status" data-motor="1">Motor 1: Idle</div>
  <div class="speed-row">
    <label>Speed: <span class="speed-label" data-motor="1">Medium</span></label>
    <input type="range" min="0" max="3" step="1" value="1"
           data-motor="1" oninput="onSpeedInput(1, this.value)">
  </div>
  <button class="start"   onclick="hit('/api/motors/1/start')">Start</button>
  <button class="stop"    onclick="hit('/api/motors/1/stop')">Stop</button>
  <button class="run5"    onclick="hit('/api/motors/1/run5')">Run 5 seconds</button>
  <button class="reverse" onclick="hit('/api/motors/1/reverse')">Reverse</button>

  <div class="divider">Motor 2</div>
  <div class="motor-status" data-motor="2">Motor 2: Idle</div>
  <div class="speed-row">
    <label>Speed: <span class="speed-label" data-motor="2">Medium</span></label>
    <input type="range" min="0" max="3" step="1" value="1"
           data-motor="2" oninput="onSpeedInput(2, this.value)">
  </div>
  <button class="start"   onclick="hit('/api/motors/2/start')">Start</button>
  <button class="stop"    onclick="hit('/api/motors/2/stop')">Stop</button>
  <button class="run5"    onclick="hit('/api/motors/2/run5')">Run 5 seconds</button>
  <button class="reverse" onclick="hit('/api/motors/2/reverse')">Reverse</button>

  <div class="divider">LEDs</div>
  <button class="leds-on"      onclick="hit('/api/leds/on')">LEDs On</button>
  <button class="leds-off"     onclick="hit('/api/leds/off')">LEDs Off</button>
  <button class="leds-pattern" onclick="hit('/api/leds/pattern')">Pattern (10s)</button>

  <script>
    const SPEED_NAMES = ['Slow', 'Medium', 'Fast', 'Max'];

    async function hit(path) {
      try {
        const r = await fetch(path, { method: 'POST' });
        render(await r.json());
      } catch (e) { /* network blip — next poll will recover */ }
    }
    async function poll() {
      try {
        const r = await fetch('/api/status');
        render(await r.json());
      } catch (e) {}
    }
    function onSpeedInput(motorId, value) {
      // Snappy local feedback while the request flies.
      const label = document.querySelector(`.speed-label[data-motor="${motorId}"]`);
      if (label) label.textContent = SPEED_NAMES[value];
      hit(`/api/motors/${motorId}/speed/${value}`);
    }
    function render(j) {
      if (!j || !j.motors) return;  // ignore LED responses
      for (const [id, m] of Object.entries(j.motors)) {
        const status = document.querySelector(`.motor-status[data-motor="${id}"]`);
        if (status) {
          const arrow = m.direction < 0 ? ' ←' : ' →';
          if (m.running) {
            status.textContent = `Motor ${id}: Running${arrow}`;
            status.classList.add('running');
          } else {
            status.textContent = `Motor ${id}: Idle${arrow}`;
            status.classList.remove('running');
          }
        }
        const slider = document.querySelector(`input[type=range][data-motor="${id}"]`);
        // Don't yank the slider out from under a finger mid-drag.
        if (slider && document.activeElement !== slider) {
          slider.value = m.speed;
        }
        const label = document.querySelector(`.speed-label[data-motor="${id}"]`);
        if (label) label.textContent = SPEED_NAMES[m.speed];
      }
    }
    setInterval(poll, 1000);
    poll();
  </script>
</body>
</html>
